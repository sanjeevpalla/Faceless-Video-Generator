[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:app
